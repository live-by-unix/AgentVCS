name: Upload Python Package

on:
  workflow_dispatch:   # ✅ Manual trigger only

permissions:
  contents: read

jobs:
  release-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build release distributions
        run: |
          python -m build

      - name: Rename distributions to avoid filename reuse
        run: |
          mkdir renamed
          for f in dist/*; do
            base=$(basename "$f")
            # Append a build tag (e.g., +reupload) to filenames
            mv "$f" "renamed/${base/.whl/+reupload.whl}"
            mv "renamed/${base/.whl/+reupload.whl}" "renamed/${base/.tar.gz/+reupload.tar.gz}" || true
          done

      - name: Check renamed distributions
        run: |
          twine check renamed/*

      - name: Upload renamed distributions
        uses: actions/upload-artifact@v4
        with:
          name: release-dists
          path: renamed/

      - name: Confirm workflow run
        run: echo "✅ Build completed and artifacts renamed + uploaded"

  pypi-publish:
    runs-on: ubuntu-latest
    needs: release-build
    permissions:
      id-token: write

    environment:
      name: pypi
      url: https://pypi.org/project/agentvcs/

    steps:
      - name: Retrieve release distributions
        uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: dist/

      - name: Publish renamed distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AgentVCS</title>
    <!-- Include Marked.js via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js"></script>
</head>
<body>

    <!-- Container for Markdown content -->
    <div id="content">Loading content...</div>

    <script>
        // Get ?file=FILENAME.md from the URL, default to README.md
        const params = new URLSearchParams(window.location.search);
        const file = params.get('file') || 'README.md';

        // Fetch and render the Markdown file
        fetch(file)
            .then(response => {
                if (!response.ok) throw new Error("File not found");
                return response.text();
            })
            .then(markdownText => {
                const html = marked.parse(markdownText);
                const contentDiv = document.getElementById('content');
                contentDiv.innerHTML = html;

                // Rewrite links: if they point to .md, reload inside site
                contentDiv.querySelectorAll('a').forEach(link => {
                    const href = link.getAttribute('href');
                    if (href && href.endsWith('.md')) {
                        link.addEventListener('click', e => {
                            e.preventDefault();
                            window.location.search = '?file=' + href;
                        });
                    } else {
                        // External links open in new tab
                        link.setAttribute('target', '_blank');
                        link.setAttribute('rel', 'noopener noreferrer');
                    }
                });
            })
            .catch(error => {
                document.getElementById('content').innerHTML = "Error loading file.";
                console.error(error);
            });
    </script>
</body>
</html>
